<div class="auth-container">
  <div class="auth-card glass">
    <h2 class="gradient-text">Đăng Ký</h2>
    <p class="subtitle">Tham gia CinemaMax ngay hôm nay</p>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="fullName">Họ và Tên</label>
        <input type="text" id="fullName" formControlName="fullName" placeholder="Nguyễn Văn A">
        <div class="error-msg" *ngIf="registerForm.get('fullName')?.touched && registerForm.get('fullName')?.invalid">
          Vui lòng nhập họ tên
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" formControlName="email" placeholder="abc@example.com">
        <div class="error-msg" *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid">
          Email không hợp lệ
        </div>
      </div>

      <div class="form-group">
        <label for="phoneNumber">Số điện thoại</label>
        <input type="text" id="phoneNumber" formControlName="phoneNumber" placeholder="0123456xxx">
      </div>

      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" formControlName="password" placeholder="********">
        <div class="error-msg" *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid">
          Mật khẩu phải có ít nhất 6 ký tự
        </div>
      </div>

      <div class="error-msg server-error" *ngIf="error">{{ error }}</div>
      <div class="success-msg server-success" *ngIf="successMsg">{{ successMsg }}</div>
      <div class="error-msg server-error" *ngIf="registerForm.invalid && registerForm.touched && !error && !successMsg">
        Vui lòng điền đầy đủ thông tin hợp lệ
      </div>

      <button type="submit" [disabled]="loading || successMsg !== ''" class="btn-primary">
        {{ successMsg ? 'Đăng ký thành công...' : (loading ? 'Đang xử lý...' : 'Đăng Ký') }}
      </button>

      <div class="auth-footer">
        Bạn đã có tài khoản? <a routerLink="/login">Đăng nhập</a>
      </div>
    </form>
  </div>
</div>
