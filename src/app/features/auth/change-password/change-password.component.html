<div class="auth-container">
  <div class="auth-card glass">
    <h2 class="gradient-text">Đổi Mật Khẩu</h2>
    <p class="subtitle">Cập nhật mật khẩu để bảo vệ tài khoản của bạn</p>

    <form [formGroup]="changeForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="currentPassword">Mật khẩu hiện tại</label>
        <input type="password" id="currentPassword" formControlName="currentPassword"
          placeholder="Nhập mật khẩu hiện tại">
        <div class="error-msg"
          *ngIf="changeForm.get('currentPassword')?.touched && changeForm.get('currentPassword')?.invalid">
          Vui lòng nhập mật khẩu hiện tại
        </div>
      </div>

      <div class="form-group">
        <label for="newPassword">Mật khẩu mới</label>
        <input type="password" id="newPassword" formControlName="newPassword" placeholder="Tối thiểu 8 ký tự">
        <div class="error-msg" *ngIf="changeForm.get('newPassword')?.touched && changeForm.get('newPassword')?.invalid">
          Mật khẩu mới phải có ít nhất 8 ký tự
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Xác nhận mật khẩu mới</label>
        <input type="password" id="confirmPassword" formControlName="confirmPassword"
          placeholder="Nhập lại mật khẩu mới">
        <div class="error-msg" *ngIf="changeForm.get('confirmPassword')?.touched && changeForm.hasError('mismatch')">
          Mật khẩu xác nhận không khớp
        </div>
      </div>

      <div class="error-msg server-error" *ngIf="error">{{ error }}</div>
      <div class="success-msg server-success" *ngIf="successMsg">
        {{ successMsg }}
        <br><small>Bạn sẽ được đăng xuất để bảo mật.</small>
      </div>

      <button type="submit" [disabled]="loading || successMsg !== ''" class="btn-primary">
        {{ successMsg ? 'Đang đăng xuất...' : (loading ? 'Đang xử lý...' : 'Đổi Mật Khẩu') }}
      </button>

      <div class="auth-footer">
        <a routerLink="/profile">← Quay lại Profile</a>
      </div>
    </form>
  </div>
</div>
