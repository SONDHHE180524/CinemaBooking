<div class="auth-container">
  <div class="auth-card glass">
    <h2 class="gradient-text">Đặt Lại Mật Khẩu</h2>
    <p class="subtitle">Nhập mã OTP nhận từ email và mật khẩu mới</p>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" formControlName="email" [placeholder]="prefillEmail || 'abc@example.com'">
        <div class="error-msg" *ngIf="resetForm.get('email')?.touched && resetForm.get('email')?.invalid">
          Vui lòng nhập email hợp lệ
        </div>
      </div>

      <div class="form-group">
        <label for="otp">Mã OTP (6 chữ số)</label>
        <input type="text" id="otp" formControlName="otp" placeholder="123456" maxlength="6">
        <div class="error-msg" *ngIf="resetForm.get('otp')?.touched && resetForm.get('otp')?.invalid">
          Mã OTP phải có đúng 6 chữ số
        </div>
      </div>

      <div class="form-group">
        <label for="newPassword">Mật khẩu mới</label>
        <input type="password" id="newPassword" formControlName="newPassword" placeholder="Tối thiểu 8 ký tự">
        <div class="error-msg" *ngIf="resetForm.get('newPassword')?.touched && resetForm.get('newPassword')?.invalid">
          Mật khẩu phải có ít nhất 8 ký tự
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Xác nhận mật khẩu</label>
        <input type="password" id="confirmPassword" formControlName="confirmPassword"
          placeholder="Nhập lại mật khẩu mới">
        <div class="error-msg" *ngIf="resetForm.get('confirmPassword')?.touched && resetForm.hasError('mismatch')">
          Mật khẩu xác nhận không khớp
        </div>
      </div>

      <div class="error-msg server-error" *ngIf="error">{{ error }}</div>
      <div class="success-msg server-success" *ngIf="successMsg">{{ successMsg }}</div>

      <button type="submit" [disabled]="loading || successMsg !== ''" class="btn-primary">
        {{ successMsg ? 'Đang chuyển hướng...' : (loading ? 'Đang xử lý...' : 'Đặt Lại Mật Khẩu') }}
      </button>

      <div class="auth-footer">
        <a routerLink="/forgot-password">← Gửi lại mã OTP</a>
        &nbsp;|&nbsp;
        <a routerLink="/login">Đăng nhập</a>
      </div>
    </form>
  </div>
</div>
