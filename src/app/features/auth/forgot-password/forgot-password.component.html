<div class="auth-container">
  <div class="auth-card glass">
    <h2 class="gradient-text">Quên Mật Khẩu</h2>
    <p class="subtitle">Nhập email của bạn để nhận mã OTP đặt lại mật khẩu</p>

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="abc@example.com"
          (blur)="forgotForm.get('email')?.setValue(forgotForm.get('email')?.value?.trim())"
        >
        <div class="error-msg" *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid">
          Vui lòng nhập email hợp lệ
        </div>
      </div>

      <div class="error-msg server-error" *ngIf="error">{{ error }}</div>
      <div class="success-msg server-success" *ngIf="successMsg">{{ successMsg }}</div>

      <button type="submit" [disabled]="loading || successMsg !== ''" class="btn-primary">
        {{ successMsg ? 'Đang chuyển hướng...' : (loading ? 'Đang gửi...' : 'Gửi Mã OTP') }}
      </button>

      <div class="auth-footer">
        Nhớ mật khẩu rồi? <a routerLink="/login">Đăng nhập</a>
      </div>
    </form>
  </div>
</div>
